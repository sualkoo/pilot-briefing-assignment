<section class="hero">
  <div class="hero-atmosphere"></div>
  <div class="hero-horizon"></div>

  <div class="hero-plane-track">
    <div class="hero-contrail"></div>
    <mat-icon class="hero-plane">flight</mat-icon>
  </div>

  <div class="hero-content">
    <h1 class="hero-title">
      Fly Informed.<br />
      <span class="hero-accent">Fly Safe.</span>
    </h1>

    <p class="hero-subtitle">
      Real-time METAR observations, TAF forecasts and SIGMET hazard alerts<br />
      for professional pre-flight planning.
    </p>

    <div class="hero-features">
      <div class="hero-feature">
        <mat-icon>thermostat</mat-icon>
        <div>
          <strong>METAR</strong>
          <small>Current observations</small>
        </div>
      </div>
      <div class="hero-feature">
        <mat-icon>schedule</mat-icon>
        <div>
          <strong>TAF</strong>
          <small>Terminal forecasts</small>
        </div>
      </div>
      <div class="hero-feature">
        <mat-icon>warning</mat-icon>
        <div>
          <strong>SIGMET</strong>
          <small>Hazard alerts</small>
        </div>
      </div>
    </div>

    <button class="hero-cta" routerLink="/briefing">
      <mat-icon>flight_takeoff</mat-icon>
      Start Briefing
    </button>
  </div>
</section>
